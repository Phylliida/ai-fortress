<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Take Apart · ai-fortress</title>
<style>
  :root {
    --bg:#1b1714; --panel:#262019; --ink:#ece3d4; --muted:#a99c86;
    --accent:#d8a657; --line:#3a3128; --ok:#8ab368; --err:#d77a61;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif; }
  header { display:flex; align-items:baseline; gap:12px; padding:16px 22px; border-bottom:1px solid var(--line); background:var(--panel); }
  h1 { font-family:Georgia,serif; font-weight:600; margin:0; font-size:21px; color:var(--accent); }
  header small { color:var(--muted); font-size:12px; font-family:ui-monospace,monospace; }
  header .links { margin-left:auto; display:flex; gap:14px; }
  header a { color:var(--muted); font-size:12px; text-decoration:none; }
  header a:hover { color:var(--accent); }
  .wrap { max-width:820px; margin:0 auto; padding:22px; }
  .controls { display:flex; gap:9px; flex-wrap:wrap; }
  input { background:#15110d; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:8px 11px; font:inherit; }
  input::placeholder { color:var(--muted); }
  #thing { flex:1 1 240px; } #desc { flex:2 1 280px; }
  button { background:var(--accent); color:#1b1410; border:0; border-radius:7px; padding:8px 15px; font-weight:600; cursor:pointer; }
  .hint { color:var(--muted); font-size:12px; margin:6px 0 18px; }
  #tree { font:14px/1.6 ui-monospace, "SF Mono", monospace; }
  .children { margin-left:15px; padding-left:13px; border-left:1px solid var(--line); display:none; }
  .row { display:flex; align-items:baseline; gap:7px; padding:2px 6px; border-radius:6px; cursor:pointer; }
  .row:hover { background:#15110d; }
  .caret { width:13px; color:var(--accent); flex:0 0 13px; text-align:center; user-select:none; transition:transform .12s; }
  .caret.spin { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .label { color:var(--ink); }
  .row.leaf .label { color:var(--muted); }
  .meta { color:var(--muted); font-size:11px; font-style:italic; margin-left:6px; }
  .meta.err { color:var(--err); font-style:normal; }
</style>
</head>
<body>
<header>
  <h1>Take Apart</h1>
  <small>enter anything · click a part to open it · keep going</small>
  <div class="links"><a href="/parts">innards →</a><a href="/">world-builder →</a></div>
</header>

<div class="wrap">
  <div class="controls">
    <input id="thing" placeholder="a clockwork dragon, a sandwich, a starship engine…" autofocus>
    <input id="desc" placeholder="optional description">
    <button id="go">Take apart</button>
  </div>
  <div class="hint">Each click runs the open-ended decomposer (generate → dedup → verify) one level deeper. Some parts are single pieces — they'll open to "nothing inside."</div>
  <div id="tree"></div>
</div>

<script>
const $ = id => document.getElementById(id);

function makeNode(name, path, desc) {     // path = full lineage (root..this), sent as context
  const node = document.createElement('div'); node.className = 'node';
  const row = document.createElement('div'); row.className = 'row';
  const caret = document.createElement('span'); caret.className = 'caret'; caret.textContent = '▸';
  const label = document.createElement('span'); label.className = 'label'; label.textContent = name;
  const meta = document.createElement('span'); meta.className = 'meta';
  row.append(caret, label, meta);
  const children = document.createElement('div'); children.className = 'children';
  node.append(row, children);
  let loaded = false, loading = false, open = false, count = 0;

  row.onclick = () => {
    if (loading) return;
    if (loaded) {                                   // toggle collapse
      open = !open;
      children.style.display = open ? 'block' : 'none';
      caret.textContent = count ? (open ? '▾' : '▸') : '·';
      return;
    }
    loading = true; count = 0; meta.className = 'meta'; meta.textContent = '';
    caret.textContent = '◌'; caret.classList.add('spin');
    const url = '/api/decompose?path=' + encodeURIComponent(path.join('|')) + (desc ? '&desc=' + encodeURIComponent(desc) : '');
    const es = new EventSource(url);
    es.onmessage = ev => {
      const m = JSON.parse(ev.data);
      if (m.type === 'part') { children.appendChild(makeNode(m.part, path.concat(m.part), '')); count++; children.style.display = 'block'; }
      else if (m.type === 'status') { meta.textContent = m.message; }
      else if (m.type === 'done') {
        es.close(); loading = false; loaded = true; open = true;
        caret.classList.remove('spin');
        caret.textContent = count ? '▾' : '·';
        meta.textContent = count ? '' : 'nothing inside';
        if (!count) row.classList.add('leaf');
      } else if (m.type === 'error') {
        es.close(); loading = false; caret.classList.remove('spin'); caret.textContent = '▸';
        meta.className = 'meta err'; meta.textContent = m.message;
      }
    };
    es.onerror = () => { es.close(); loading = false; caret.classList.remove('spin'); caret.textContent = '▸'; meta.className = 'meta err'; meta.textContent = 'connection lost'; };
  };
  return node;
}

function explore() {
  const thing = $('thing').value.trim();
  if (!thing) { $('thing').focus(); return; }
  const desc = $('desc').value.trim();
  $('tree').innerHTML = '';
  const root = makeNode(thing, [thing], desc);
  $('tree').appendChild(root);
  root.querySelector('.row').click();               // auto-expand the root
}

$('go').onclick = explore;
$('thing').addEventListener('keydown', e => { if (e.key === 'Enter') explore(); });
$('desc').addEventListener('keydown', e => { if (e.key === 'Enter') explore(); });
</script>
</body>
</html>
