<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ai-fortress · colony map</title>
<style>
  :root {
    --bg:#1b1714; --panel:#262019; --ink:#ece3d4; --muted:#a99c86;
    --accent:#d8a657; --line:#3a3128; --ok:#8ab368; --err:#d77a61; --grid:#2c2520;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif; display:flex; flex-direction:column; }
  h1 { font-family:Georgia,serif; font-weight:600; margin:0; font-size:20px; color:var(--accent); white-space:nowrap; }
  h1 small { color:var(--muted); font-size:12px; font-weight:400; font-family:ui-monospace,monospace; }
  header { padding:11px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header .spacer { flex:1; }
  input, select, textarea, button { font:inherit; }
  input, select { background:#15110d; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:6px 9px; }
  input::placeholder { color:var(--muted); }
  button { background:var(--accent); color:#1b1410; border:0; border-radius:7px; padding:7px 11px; font-weight:600; font-size:13px; cursor:pointer; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button.ghost.active { background:var(--accent); color:#1b1410; }
  button.sm { padding:4px 8px; font-size:12px; }
  button:disabled { opacity:.4; cursor:not-allowed; }

  /* roster strip */
  .roster { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--line); background:var(--panel); overflow-x:auto; min-height:78px; }
  .roster .empty { color:var(--muted); font-style:italic; }
  .figbtn { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px; width:62px; padding:5px 3px; border:1px solid transparent; border-radius:9px; cursor:pointer; user-select:none; }
  .figbtn:hover { border-color:var(--line); background:#15110d; }
  .figbtn .nm { font-size:11px; color:var(--ink); max-width:58px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .figbtn.placed { opacity:.5; }
  .figbtn.placed .nm { color:var(--muted); }
  .figbtn.unplaced { cursor:grab; }
  .figbtn .tag { font-size:9px; color:var(--muted); font-family:ui-monospace,monospace; }
  svg.stick { width:30px; height:42px; display:block; }

  /* stage = item palette (left) + map */
  .stage { flex:1; display:flex; min-height:0; }
  .palette { flex:0 0 198px; border-right:1px solid var(--line); background:var(--panel); padding:13px; overflow-y:auto; }
  .palette label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .palette input { width:100%; background:#15110d; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:6px 8px; font:inherit; }
  .palette .additem { width:100%; margin-top:7px; }
  .paletteItem { display:flex; flex-direction:column; gap:1px; border:1px solid var(--line); border-radius:8px; padding:7px 9px; margin-top:9px; background:#15110d; cursor:grab; }
  .paletteItem:hover { border-color:var(--accent); }
  .paletteItem .itn { font-size:13px; color:var(--ink); }
  .paletteItem .itf { font-size:10px; color:var(--muted); font-family:ui-monospace,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* item instances on the map (under the colonists) */
  .map .mapitem { position:absolute; width:18px; height:18px; display:flex; align-items:center; justify-content:center; cursor:grab; z-index:1; }
  .map .mapitem .box { width:13px; height:13px; border-radius:2px; background:var(--accent); border:1px solid #15110d; }
  .map .mapitem .nm { position:absolute; top:17px; left:50%; transform:translateX(-50%); display:none; font-size:11px; color:var(--ink); background:rgba(20,16,11,.85); padding:0 4px; border-radius:4px; white-space:nowrap; z-index:6; }
  .map .mapitem:hover { z-index:5; } .map .mapitem:hover .nm { display:block; }
  .minimap .mmitem { border-radius:1px; background:var(--accent); width:4px; height:4px; }

  /* map */
  .mapwrap { flex:1; overflow:hidden; position:relative; cursor:grab; background:#120f0b; }
  .mapwrap.grabbing { cursor:grabbing; }
  /* grid is a NON-transformed overlay sized to the map, so its lines stay 1px at every zoom */
  .grid { position:absolute; top:0; left:0; pointer-events:none; background-color:#15110d; }
  .map { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
  .map .mapfig { position:absolute; width:18px; height:18px; display:flex; align-items:center; justify-content:center; cursor:grab; z-index:2; }
  .map .mapfig svg.stick { width:auto; height:16px; }
  .map .mapfig .nm { position:absolute; top:17px; left:50%; transform:translateX(-50%); display:none; font-size:11px; color:var(--accent); background:rgba(20,16,11,.85); padding:0 4px; border-radius:4px; white-space:nowrap; z-index:6; }
  .map .mapfig:hover { z-index:5; }
  .map .mapfig:hover .nm { display:block; }
  .map .mapfig.focus svg.stick { filter:drop-shadow(0 0 7px var(--accent)); }

  /* generate popover + detail popover */
  .pop { position:absolute; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; box-shadow:0 8px 28px rgba(0,0,0,.5); z-index:50; width:300px; max-height:calc(100vh - 84px); overflow-y:auto; }
  .pop label { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:8px 0 3px; }
  .pop .row { display:flex; gap:8px; } .pop .row > * { flex:1; }
  .pop input, .pop select { width:100%; }
  .status { font:12px ui-monospace,monospace; color:var(--muted); margin-top:8px; min-height:15px; }
  .status.err { color:var(--err); } .status.ok { color:var(--ok); }
  .det .k { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:8px; }
  .det .v { font-size:13px; margin-top:1px; }
  .det .nmh { font-family:Georgia,serif; font-size:18px; color:var(--accent); }
  .det .meta { font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; }
  .det .x { position:absolute; top:8px; right:10px; color:var(--muted); cursor:pointer; font-size:16px; }
  .clock { font:600 17px ui-monospace,monospace; color:var(--accent); min-width:54px; }
  #playBtn { padding:5px 11px; font-size:13px; }
  .doing { font:12px ui-monospace,monospace; color:var(--accent); margin:7px 0 3px; }
  .needs { margin-top:4px; }
  .needbar { display:flex; align-items:center; gap:7px; margin-top:4px; }
  .needbar .nl { flex:0 0 86px; font-size:11px; color:var(--muted); text-transform:capitalize; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .needbar .nb { position:relative; flex:1; height:9px; background:#15110d; border:1px solid var(--line); border-radius:5px; overflow:hidden; }
  .needbar .nb > i { display:block; height:100%; transition:width .15s linear; }
  .needbar .nb .th { position:absolute; top:0; bottom:0; width:2px; background:var(--ink); opacity:.55; }  /* threshold line */
  .needbar .np { flex:0 0 32px; text-align:right; font:10px ui-monospace,monospace; color:var(--muted); }
  .hint { position:absolute; left:50%; top:14px; transform:translateX(-50%); color:var(--muted); font-size:12px; background:rgba(20,16,11,.7); padding:4px 10px; border-radius:8px; pointer-events:none; z-index:1; }
  /* minimap */
  .minimap { position:fixed; bottom:18px; right:18px; width:150px; height:150px; background:rgba(18,15,11,.92); border:1px solid var(--accent); border-radius:6px; cursor:crosshair; z-index:40; box-shadow:0 4px 18px rgba(0,0,0,.55); }
  .minimap .mmdot { position:absolute; width:5px; height:5px; border-radius:50%; transform:translate(-50%,-50%); }
  .minimap .mmviewport { position:absolute; border:1px solid var(--ink); background:rgba(216,166,87,.14); pointer-events:none; }
</style>
</head>
<body>
<header>
  <h1>ai-fortress <small>· colony map</small></h1>
  <span id="clock" class="clock">08:00</span>
  <button id="playBtn" class="ghost" title="play / pause time">▶</button>
  <button id="ff2Btn" class="ghost" title="2× speed">⏩</button>
  <button id="ff4Btn" class="ghost" title="4× speed">⏩⏩</button>
  <select id="worldSel" title="switch world"></select>
  <input id="newPrompt" placeholder="new world: a neon cyberpunk megacity…" style="width:280px">
  <button id="newWorldBtn">+ world</button>
  <span class="spacer"></span>
  <span id="worldId" class="tag" style="color:var(--muted);font:11px ui-monospace,monospace"></span>
</header>

<div class="roster" id="roster"><span class="empty">No world yet — create one above.</span></div>

<div class="stage">
  <div class="palette" id="palette">
    <label>World species</label>
    <div id="speciesLine" class="itf" style="margin-bottom:12px">—</div>
    <label>Items</label>
    <input id="itemInput" placeholder="loaf of bread, stovetop…" autocomplete="off">
    <button id="addItemBtn" class="additem">+ add item</button>
    <div id="itemStatus" class="status"></div>
    <div id="itemList"></div>
  </div>
  <div class="mapwrap" id="mapwrap">
    <div class="grid" id="grid"></div>
    <div class="map" id="map"></div>
  </div>
</div>
<div class="minimap" id="minimap" style="display:none"><div class="mmviewport" id="mmviewport"></div></div>

<script>
const MAP = 500;            // world is MAP x MAP cells
const SCALE = 18;          // BASE pixels per cell; the map is transformed by `zoom` on top of this
const MAPPX = MAP * SCALE;  // 9000px untransformed map
const GRID_MINOR = 1, GRID_MAJOR = 10;    // grid lines every N cells
const GCOLOR = { female:"#e6a4c4", male:"#7fb4e6", nonbinary:"#c9a6e0" };

function el(tag, props={}, ...kids) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === "class") e.className = props[k];
    else if (k === "text") e.textContent = props[k];
    else if (k.startsWith("on") && typeof props[k] === "function") e.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) e.setAttribute(k, props[k]);
  }
  for (let kid of kids.flat()) if (kid != null) e.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  return e;
}
function stream(url, onmsg, onend) {
  const es = new EventSource(url);
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === "error") { es.close(); onend(false, d.message); return; }
    if (d.type === "done")  { es.close(); onend(true); return; }
    onmsg(d);
  };
  es.onerror = () => { es.close(); onend(false, "lost connection"); };
}
function stick(color) {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", "0 0 24 38"); svg.setAttribute("class", "stick");
  svg.innerHTML =
    `<circle cx="12" cy="6" r="5" fill="${color}"/>` +
    `<g stroke="${color}" stroke-width="3" stroke-linecap="round">` +
    `<line x1="12" y1="11" x2="12" y2="25"/><line x1="12" y1="15" x2="5" y2="21"/>` +
    `<line x1="12" y1="15" x2="19" y2="21"/><line x1="12" y1="25" x2="6" y2="35"/>` +
    `<line x1="12" y1="25" x2="18" y2="35"/></g>`;
  return svg;
}
const gcolor = ch => GCOLOR[ch.gender] || "var(--accent)";

let state = { wid: null, world: null, needLevels: {}, openNeeds: null, openDetailCid: null, sim: null };

// persist world / open-character / zoom / pan in the URL hash (replaceState = no history spam)
let syncTimer = null;
function syncHash() { clearTimeout(syncTimer); syncTimer = setTimeout(writeHash, 200); }
function writeHash() {
  if (!state.wid) return;
  const p = new URLSearchParams();
  p.set("w", state.wid);
  p.set("z", zoom.toFixed(4)); p.set("x", Math.round(panX)); p.set("y", Math.round(panY));
  if (state.openDetailCid) p.set("c", state.openDetailCid);
  history.replaceState(null, "", "#" + p.toString());
}
async function restoreFromHash() {
  const p = new URLSearchParams(location.hash.replace(/^#/, ""));
  const wid = p.get("w"); if (!wid) return;
  state.wid = wid; state.needLevels = {}; state.sim = null;
  await refreshWorld();
  if (!state.world || state.world.error) { state.wid = null; return; }   // stale/deleted world
  fetch(`/api/world/${wid}/sim/reset`, { method: "POST" });
  const z = parseFloat(p.get("z")), px = parseFloat(p.get("x")), py = parseFloat(p.get("y"));
  if (!isNaN(z) && !isNaN(px) && !isNaN(py)) { zoom = Math.max(ZMIN, Math.min(ZMAX, z)); panX = px; panY = py; clampPan(); applyView(); }
  else resetView();
  const ch = p.get("c") && byCid(p.get("c"));
  if (ch) openDetail(ch);
}

// ----------------------------------------------------------------- worlds
async function loadWorlds() {
  const { worlds } = await (await fetch("/api/worlds")).json();
  const sel = document.getElementById("worldSel"); sel.innerHTML = "";
  sel.appendChild(el("option", { value: "", text: worlds.length ? "— pick a world —" : "— no worlds —" }));
  for (const w of worlds)
    sel.appendChild(el("option", { value: w.id, text: `${w.prompt}  (${w.n_characters})`, ...(w.id === state.wid ? { selected: "" } : {}) }));
  sel.value = state.wid || "";
}
document.getElementById("worldSel").onchange = e => { if (e.target.value) openWorld(e.target.value); };
document.getElementById("newWorldBtn").onclick = async () => {
  const prompt = document.getElementById("newPrompt").value.trim();
  if (!prompt) return;
  const { id } = await (await fetch("/api/world", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prompt }) })).json();
  document.getElementById("newPrompt").value = "";
  await loadWorlds(); openWorld(id);
};
async function refreshWorld() {            // re-fetch + re-render, KEEP the current pan/zoom
  state.world = await (await fetch("/api/world/" + state.wid)).json();
  document.getElementById("worldId").textContent = state.world.prompt + " · " + state.wid;
  await loadWorlds();
  initNeeds();
  renderRoster(); renderPalette(); renderMap();
}
async function openWorld(wid) {            // switch worlds -> also reset the view to fit
  closePops();
  state.wid = wid;
  state.needLevels = {}; state.sim = null;  // fresh sim state for the new world
  fetch(`/api/world/${wid}/sim/reset`, { method: "POST" });
  await refreshWorld();
  resetView();
}

// ----------------------------------------------------------------- roster
function isPlaced(cid) { return state.world && state.world.placements && cid in state.world.placements; }

function renderRoster() {
  const r = document.getElementById("roster"); r.innerHTML = "";
  const chars = (state.world.characters || []);
  if (!chars.length) r.appendChild(el("span", { class: "empty", text: "No characters yet — generate one →" }));
  for (const ch of chars) {
    const placed = isPlaced(ch.cid);
    const btn = el("div", { class: "figbtn " + (placed ? "placed" : "unplaced"),
      title: placed ? "click to focus on the map" : "drag onto the map",
      draggable: placed ? null : "true" },
      stick(gcolor(ch)),
      el("div", { class: "nm", text: ch.name }),
      el("div", { class: "tag", text: placed ? "on map" : "drag →" }));
    if (placed) btn.onclick = () => focusChar(ch.cid);
    else btn.addEventListener("dragstart", e => e.dataTransfer.setData("text/cid", ch.cid));
    r.appendChild(btn);
  }
  r.appendChild(genControl());
}

function genControl() {
  const wrap = el("div", { style: "flex:0 0 auto; margin-left:8px; position:relative" });
  const btn = el("button", { class: "ghost", text: "+ generate ▾", disabled: state.wid ? null : "" });
  btn.onclick = () => { closePops(); openGenPop(wrap); };
  wrap.appendChild(btn);
  return wrap;
}

function openGenPop(anchor) {
  const gender = el("select", {}, ...["female", "male", "nonbinary"].map(g => el("option", { text: g })));
  const species = el("input", { value: "human" });
  const status = el("div", { class: "status" });
  const go = el("button", { text: "summon", style: "margin-top:10px; width:100%" });
  const pop = el("div", { class: "pop", "data-pop": "1", style: "top:64px; left:auto; right:14px" },
    el("label", { text: "gender" }), gender,
    el("label", { text: "species" }), species, go, status);
  go.onclick = () => {
    go.disabled = true; status.className = "status"; status.textContent = "summoning…";
    const q = new URLSearchParams({ gender: gender.value, species: species.value.trim() || "human" });
    let nm = "";
    stream(`/api/world/${state.wid}/character?` + q, d => {
      if (d.type === "field" && d.field === "name") { nm = d.value; status.textContent = "summoning " + nm + "…"; }
      else if (d.type === "status") status.textContent = d.message;
    }, (ok, msg) => {
      status.textContent = ok ? "✓ " + nm : "⚠ " + msg; status.className = "status" + (ok ? " ok" : " err");
      go.disabled = false;
      if (ok) refreshWorld().then(() => setTimeout(closePops, 700));
    });
  };
  document.body.appendChild(pop);
}

// ----------------------------------------------------------------- map
function renderMap() {
  const map = document.getElementById("map");
  document.querySelectorAll("[data-hint]").forEach(h => h.remove());   // clear stale hint(s)
  map.style.width = map.style.height = (MAP * SCALE) + "px";
  map.innerHTML = "";
  const placements = state.world.placements || {};
  const byId = Object.fromEntries((state.world.characters || []).map(c => [c.cid, c]));
  const items = state.world.items || {}, iplace = state.world.item_placements || {};
  for (const pid in iplace) {                       // items first, so colonists draw on top
    const ip = iplace[pid], it = items[ip.iid]; if (!it) continue;
    map.appendChild(mapItem(pid, ip, it));
  }
  for (const cid in placements) {
    const ch = byId[cid]; if (!ch) continue;
    map.appendChild(mapFig(ch, agentPos(cid) || placements[cid]));   // live sim position if running
  }
  if (!Object.keys(placements).length && !Object.keys(iplace).length)
    document.getElementById("mapwrap").appendChild(
      el("div", { class: "hint", "data-hint": "1", text: "drag a colonist or item onto the map" }));
  renderMinimap();
}

function mapFig(ch, pos) {
  const fig = el("div", { class: "mapfig", draggable: "true" },
    stick(gcolor(ch)), el("div", { class: "nm", text: ch.name }));
  fig.style.left = (pos.x * SCALE) + "px";
  fig.style.top = (pos.y * SCALE) + "px";
  fig.dataset.cid = ch.cid;
  fig.addEventListener("dragstart", e => e.dataTransfer.setData("text/cid", ch.cid));
  fig.addEventListener("click", e => { e.stopPropagation(); openDetail(ch, e); });
  return fig;
}

async function placeChar(cid, x, y) {
  await fetch(`/api/world/${state.wid}/place`, { method: "POST",
    headers: { "Content-Type": "application/json" }, body: JSON.stringify({ cid, x, y }) });
  await refreshWorld();                    // keep the view; just update data
}

function focusChar(cid) {
  const pos = state.world.placements[cid]; if (!pos) return;
  centerOn((pos.x + 0.5) * SCALE, (pos.y + 0.5) * SCALE);
  const f = [...document.querySelectorAll(".mapfig")].find(e => e.dataset.cid === cid);
  if (f) { f.classList.add("focus"); setTimeout(() => f.classList.remove("focus"), 1400); }
}

// ---- view: pan (translate) + zoom (scale) on the map, no scrollbars ----
const mapwrap = document.getElementById("mapwrap");
const mapEl = document.getElementById("map");
const gridEl = document.getElementById("grid");
let panX = 0, panY = 0, zoom = 0.1;        // screen = translate(panX,panY) then scale(zoom) of map-px
const ZMIN = 0.02, ZMAX = 4;
function applyView() {
  mapEl.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  drawGrid();
  updateViewport();
  syncHash();
}
function drawGrid() {                        // overlay sized to the map; lines are a constant 1px
  const w = MAPPX * zoom, minor = SCALE * zoom, major = GRID_MAJOR * SCALE * zoom;
  gridEl.style.left = panX + "px"; gridEl.style.top = panY + "px";
  gridEl.style.width = w + "px"; gridEl.style.height = w + "px";
  const imgs = [], sizes = [];
  if (minor >= 6) {                          // hide the fine grid once cells get too small to read
    imgs.push("linear-gradient(var(--grid) 1px, transparent 1px)",
              "linear-gradient(90deg, var(--grid) 1px, transparent 1px)");
    sizes.push(`${minor}px ${minor}px`, `${minor}px ${minor}px`);
  }
  imgs.push("linear-gradient(var(--line) 1px, transparent 1px)",
            "linear-gradient(90deg, var(--line) 1px, transparent 1px)");
  sizes.push(`${major}px ${major}px`, `${major}px ${major}px`);
  gridEl.style.backgroundImage = imgs.join(",");
  gridEl.style.backgroundSize = sizes.join(",");
}
function clampPan() {                       // center if the map is smaller than the viewport, else clamp
  const vw = mapwrap.clientWidth, vh = mapwrap.clientHeight, w = MAPPX * zoom, m = 80;
  panX = w <= vw ? (vw - w) / 2 : Math.min(m, Math.max(vw - w - m, panX));
  panY = w <= vh ? (vh - w) / 2 : Math.min(m, Math.max(vh - w - m, panY));
}
function resetView() {                       // fit the whole world, centered
  zoom = Math.max(ZMIN, Math.min(1, Math.min(mapwrap.clientWidth, mapwrap.clientHeight) / MAPPX * 0.95));
  clampPan(); applyView();
}
function centerOn(mx, my) {                  // put map-px (mx,my) at the viewport center
  panX = mapwrap.clientWidth / 2 - mx * zoom;
  panY = mapwrap.clientHeight / 2 - my * zoom;
  clampPan(); applyView();
}

// drop onto the map -> place at that cell (account for pan+zoom)
mapwrap.addEventListener("dragover", e => { e.preventDefault(); });
mapwrap.addEventListener("drop", e => {
  e.preventDefault();
  const cid = e.dataTransfer.getData("text/cid"),
        iid = e.dataTransfer.getData("text/iid"),
        pid = e.dataTransfer.getData("text/pid");
  if (!cid && !iid && !pid) return;
  const r = mapEl.getBoundingClientRect();   // transformed (scaled) box; per-cell = SCALE*zoom px
  const x = Math.max(0, Math.min(MAP - 1, Math.floor((e.clientX - r.left) / (SCALE * zoom))));
  const y = Math.max(0, Math.min(MAP - 1, Math.floor((e.clientY - r.top) / (SCALE * zoom))));
  if (cid) placeChar(cid, x, y);             // colonist from roster
  else if (pid) moveItem(pid, x, y);         // existing item instance -> reposition
  else if (iid) placeItem(iid, x, y);        // palette item -> new instance (stamp)
});

// drag-to-pan (ignore when starting on a figure, so HTML5 drag handles those)
let panning = false, sx = 0, sy = 0, p0x = 0, p0y = 0;
mapwrap.addEventListener("mousedown", e => {
  if (e.target.closest(".mapfig") || e.target.closest(".mapitem")) return;
  panning = true; sx = e.clientX; sy = e.clientY; p0x = panX; p0y = panY;
  mapwrap.classList.add("grabbing");
});
window.addEventListener("mousemove", e => {
  if (!panning) return;
  panX = p0x + (e.clientX - sx); panY = p0y + (e.clientY - sy);
  clampPan(); applyView();
});
window.addEventListener("mouseup", () => { panning = false; mapwrap.classList.remove("grabbing"); });

// wheel = zoom toward the cursor (not scroll)
mapwrap.addEventListener("wheel", e => {
  e.preventDefault();
  const r = mapwrap.getBoundingClientRect(), cx = e.clientX - r.left, cy = e.clientY - r.top;
  const z2 = Math.max(ZMIN, Math.min(ZMAX, zoom * Math.exp(-e.deltaY * 0.0015)));
  panX = cx - (cx - panX) * (z2 / zoom);     // keep the map-px under the cursor fixed
  panY = cy - (cy - panY) * (z2 / zoom);
  zoom = z2; clampPan(); applyView();
}, { passive: false });

// ----------------------------------------------------------------- minimap
const MM = 150;                                  // minimap is MM x MM px = the whole MAP x MAP world
function renderMinimap() {
  const mm = document.getElementById("minimap");
  mm.style.display = "block";
  mm.querySelectorAll(".mmdot").forEach(d => d.remove());
  const placements = (state.world && state.world.placements) || {};
  const byId = Object.fromEntries(((state.world && state.world.characters) || []).map(c => [c.cid, c]));
  for (const cid in placements) {
    const ch = byId[cid]; if (!ch) continue;
    const p = agentPos(cid) || placements[cid];
    const dot = el("div", { class: "mmdot" });
    dot.style.left = (p.x / MAP * MM) + "px";
    dot.style.top = (p.y / MAP * MM) + "px";
    dot.style.background = gcolor(ch);
    mm.appendChild(dot);
  }
  const iplace = state.world.item_placements || {};
  for (const pid in iplace) {
    const ip = iplace[pid];
    const dot = el("div", { class: "mmdot mmitem" });
    dot.style.left = (ip.x / MAP * MM) + "px"; dot.style.top = (ip.y / MAP * MM) + "px";
    mm.appendChild(dot);
  }
  updateViewport();
}
function updateViewport() {                       // the rect = the visible map region, in minimap px
  const vp = document.getElementById("mmviewport"); if (!vp) return;
  const s = MM / MAPPX;                           // minimap px per map-px
  vp.style.left = (-panX / zoom * s) + "px";
  vp.style.top = (-panY / zoom * s) + "px";
  vp.style.width = (mapwrap.clientWidth / zoom * s) + "px";
  vp.style.height = (mapwrap.clientHeight / zoom * s) + "px";
}
function mmJump(e) {                              // click/drag the minimap -> center the main map there
  const r = document.getElementById("minimap").getBoundingClientRect();
  const s = MM / MAPPX;
  centerOn((e.clientX - r.left) / s, (e.clientY - r.top) / s);   // minimap px -> map-px, then center
}
let mmDrag = false;
document.getElementById("minimap").addEventListener("mousedown", e => { mmDrag = true; mmJump(e); e.stopPropagation(); e.preventDefault(); });
window.addEventListener("mousemove", e => { if (mmDrag) mmJump(e); });
window.addEventListener("mouseup", () => { mmDrag = false; });
window.addEventListener("resize", () => { clampPan(); applyView(); });

// ----------------------------------------------------------------- detail popover
function openDetail(ch, ev) {
  closePops();
  state.openDetailCid = ch.cid;
  const pop = el("div", { class: "pop det", "data-pop": "1" },
    el("span", { class: "x", text: "✕", onclick: closePops }),
    el("div", { class: "nmh", text: ch.name }),
    el("div", { class: "meta", text: `${ch.gender} ${ch.species}` }));
  for (const f of ["appearance", "personality", "backstory"])
    if (ch[f]) pop.appendChild(el("div", {}, el("div", { class: "k", text: f }), el("div", { class: "v", text: ch[f] })));
  if (ch.nocturnal != null)
    pop.appendChild(el("div", {}, el("div", { class: "k", text: "nocturnal" }), el("div", { class: "v", text: Math.round(ch.nocturnal * 100) + "% likely" })));
  if (ch.needs && ch.needs.length) {
    const doingEl = el("div", { class: "doing",
      text: (state.sim && state.sim.agents[ch.cid] && state.sim.agents[ch.cid].doing) || "—" });
    pop.appendChild(doingEl);
    pop.appendChild(el("div", { class: "k", text: "needs" }));
    const needsDiv = el("div", { class: "needs" });
    renderNeedBars(ch.cid, needsDiv);
    pop.appendChild(needsDiv);
    state.openNeeds = { cid: ch.cid, el: needsDiv, doingEl };   // live-update while time plays
  }
  const remove = el("button", { class: "ghost sm", text: "remove from map", style: "margin-top:12px",
    onclick: () => { placeChar(ch.cid, null, null); closePops(); } });
  pop.appendChild(remove);
  pop.style.position = "fixed";                 // pinned top-right, regardless of where they are
  pop.style.left = "auto"; pop.style.right = "16px"; pop.style.top = "64px";
  document.body.appendChild(pop);
  syncHash();
}
function closePops() {
  document.querySelectorAll("[data-pop]").forEach(p => p.remove());
  state.openNeeds = null; state.openDetailCid = null; syncHash();
}
document.addEventListener("mousedown", e => {
  if (!e.target.closest("[data-pop]") && !e.target.closest(".figbtn") && !e.target.closest(".mapfig") && !e.target.closest(".mapitem")) closePops();
});

// ----------------------------------------------------------------- items
function affordsBySpecies(item) {              // normalize: {species:{need:refill}}; wrap legacy flat
  const a = item.affords || {}, vals = Object.values(a);
  if (vals.length && typeof vals[0] === "number") return { "": a };
  return a;
}
function itemSummary(item) {
  const bysp = affordsBySpecies(item), multi = Object.keys(bysp).length > 1, parts = [];
  for (const sp in bysp) {
    const ks = Object.keys(bysp[sp]); if (!ks.length) continue;
    const f = ks.map(n => `${n} ${Math.round(bysp[sp][n] * 100)}%`).join(", ");
    parts.push(multi && sp ? `${sp}: ${f}` : f);
  }
  return parts.length ? parts.join(" · ") : "fills no needs";
}
function renderPalette() {
  document.getElementById("speciesLine").textContent = (state.world.species || []).join(", ") || "—";
  const list = document.getElementById("itemList"); list.innerHTML = "";
  const items = state.world.items || {}, ids = Object.keys(items);
  if (!ids.length) { list.appendChild(el("div", { class: "empty", style: "font-size:12px;margin-top:10px", text: "No items yet." })); return; }
  for (const iid of ids) {
    const it = items[iid];
    const pi = el("div", { class: "paletteItem", draggable: "true", title: "drag onto the map to place" },
      el("div", { class: "itn", text: it.name }),
      el("div", { class: "itf", text: itemSummary(it) }));
    pi.addEventListener("dragstart", e => e.dataTransfer.setData("text/iid", iid));
    list.appendChild(pi);
  }
}
function addItem() {
  const inp = document.getElementById("itemInput"), name = inp.value.trim();
  if (!name || !state.wid) return;
  const st = document.getElementById("itemStatus"), btn = document.getElementById("addItemBtn");
  btn.disabled = true; st.className = "status"; st.textContent = "discovering affordances…";
  const found = [];
  stream(`/api/world/${state.wid}/item?name=` + encodeURIComponent(name), d => {
    if (d.type === "afford") { found.push((d.species ? d.species + " " : "") + `${d.need} ${Math.round(d.refill * 100)}%`); st.textContent = "fills: " + found.join(", "); }
  }, (ok, msg) => {
    btn.disabled = false;
    st.textContent = ok ? (found.length ? "✓ fills " + found.join(", ") : "✓ fills no needs") : "⚠ " + msg;
    st.className = "status" + (ok ? " ok" : " err");
    if (ok) { inp.value = ""; refreshWorld().then(() => setTimeout(() => { st.textContent = ""; }, 2500)); }
  });
}
function mapItem(pid, pos, item) {
  const fig = el("div", { class: "mapitem", draggable: "true", title: item.name },
    el("div", { class: "box" }), el("div", { class: "nm", text: item.name }));
  fig.style.left = (pos.x * SCALE) + "px"; fig.style.top = (pos.y * SCALE) + "px";
  fig.dataset.pid = pid;
  fig.addEventListener("dragstart", e => e.dataTransfer.setData("text/pid", pid));
  fig.addEventListener("click", e => { e.stopPropagation(); openItemDetail(pid, item); });
  return fig;
}
async function placeItem(iid, x, y) {
  await fetch(`/api/world/${state.wid}/item_place`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ iid, x, y }) });
  await refreshWorld();
}
async function moveItem(pid, x, y) {
  const ip = (state.world.item_placements || {})[pid]; if (!ip) return;
  await fetch(`/api/world/${state.wid}/item_place`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pid, iid: ip.iid, x, y }) });
  await refreshWorld();
}
async function removeItem(pid) {
  const ip = (state.world.item_placements || {})[pid]; if (!ip) return;
  await fetch(`/api/world/${state.wid}/item_place`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pid, iid: ip.iid, x: null, y: null }) });
  await refreshWorld();
}
function openItemDetail(pid, item) {
  closePops();
  const pop = el("div", { class: "pop det", "data-pop": "1" },
    el("span", { class: "x", text: "✕", onclick: closePops }),
    el("div", { class: "nmh", text: item.name }), el("div", { class: "meta", text: "item" }));
  const bysp = affordsBySpecies(item);
  for (const sp in bysp) {
    const fills = bysp[sp], ks = Object.keys(fills);
    pop.appendChild(el("div", { class: "k", text: sp ? `fills · ${sp}` : "fills" }));
    if (ks.length) {
      const nd = el("div", { class: "needs" });
      for (const n of ks) {
        const v = fills[n], fill = el("i");
        fill.style.width = Math.round(v * 100) + "%"; fill.style.background = "var(--ok)";
        nd.appendChild(el("div", { class: "needbar" }, el("span", { class: "nl", text: n }), el("div", { class: "nb" }, fill), el("span", { class: "np", text: Math.round(v * 100) + "%" })));
      }
      pop.appendChild(nd);
    } else pop.appendChild(el("div", { class: "v", text: "no needs" }));
  }
  pop.appendChild(el("button", { class: "ghost sm", style: "margin-top:12px", text: "remove from map", onclick: () => { removeItem(pid); closePops(); } }));
  pop.style.position = "fixed"; pop.style.left = "auto"; pop.style.right = "16px"; pop.style.top = "64px";
  document.body.appendChild(pop);
}
document.getElementById("addItemBtn").onclick = addItem;
document.getElementById("itemInput").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });

// ----------------------------------------------------------------- needs + clock
function byCid(cid) { return ((state.world && state.world.characters) || []).find(c => c.cid === cid); }
function initNeeds() {                       // start every character's needs full (1.0); keep existing
  for (const ch of (state.world.characters || []))
    if (ch.needs && !(ch.cid in state.needLevels))
      state.needLevels[ch.cid] = Object.fromEntries(ch.needs.map(n => [n, 1.0]));
}
function needColor(v) { return v > 0.5 ? "var(--ok)" : v > 0.25 ? "var(--accent)" : "var(--err)"; }
function thresholdFor(cid, need) {
  const ch = byCid(cid);
  return (ch && ch.thresholds && ch.thresholds[need] != null) ? ch.thresholds[need] : 0.35;
}
function renderNeedBars(cid, container) {
  container.innerHTML = "";
  const lv = state.needLevels[cid] || {}, ch = byCid(cid);
  for (const n of ((ch && ch.needs) || Object.keys(lv))) {
    const v = lv[n] != null ? lv[n] : 1;
    const fill = el("i"); fill.style.width = Math.round(v * 100) + "%"; fill.style.background = needColor(v);
    const mark = el("div", { class: "th" }); mark.style.left = Math.round(thresholdFor(cid, n) * 100) + "%";
    container.appendChild(el("div", { class: "needbar" },
      el("span", { class: "nl", text: n }), el("div", { class: "nb" }, fill, mark),
      el("span", { class: "np", text: Math.round(v * 100) + "%" })));
  }
}

let playing = false, speed = 1, gameMin = 8 * 60, simBusy = false;
const BASE_MS = 200;   // wall cadence of sim/step calls; `speed` = ticks advanced per call (1/2/4)
function fmtClock() {
  const h = Math.floor(gameMin / 60) % 24, m = Math.floor(gameMin % 60);
  return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}
function updateClock() { document.getElementById("clock").textContent = fmtClock(); }
function agentPos(cid) { return (state.sim && state.sim.agents[cid]) || ((state.world && state.world.placements) || {})[cid]; }
function applySim() {                          // render the latest sim state: positions, bars, clock
  const s = state.sim; if (!s) return;
  gameMin = s.game_min; updateClock();
  for (const cid in s.agents) {
    const a = s.agents[cid];
    const fig = document.querySelector(`.mapfig[data-cid="${cid}"]`);
    if (fig) { fig.style.left = (a.x * SCALE) + "px"; fig.style.top = (a.y * SCALE) + "px"; }
    state.needLevels[cid] = a.needs;
  }
  if (state.openNeeds) {
    renderNeedBars(state.openNeeds.cid, state.openNeeds.el);
    const a = s.agents[state.openNeeds.cid];
    if (state.openNeeds.doingEl && a) state.openNeeds.doingEl.textContent = a.doing;
  }
  renderMinimap();
}
async function simLoop() {
  if (!playing || simBusy || !state.wid) return;
  simBusy = true;
  try {
    const r = await fetch(`/api/world/${state.wid}/sim/step`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ticks: speed }) });
    state.sim = await r.json();
    applySim();
  } catch (e) {}
  simBusy = false;
  if (playing) setTimeout(simLoop, BASE_MS);
}
function updateSpeedUI() {
  document.getElementById("playBtn").textContent = playing ? "⏸" : "▶";
  document.getElementById("ff2Btn").classList.toggle("active", speed === 2);
  document.getElementById("ff4Btn").classList.toggle("active", speed === 4);
}
function togglePlay() { const was = playing; playing = !playing; updateSpeedUI(); if (playing && !was) simLoop(); }
function setSpeed(s) {                          // a fast-forward button always plays; click the active one -> 1×
  const was = playing;
  if (playing && speed === s) speed = 1;
  else { speed = s; playing = true; }
  updateSpeedUI();
  if (playing && !was) simLoop();              // only kick off a loop on paused -> playing
}
document.getElementById("playBtn").onclick = togglePlay;
document.getElementById("ff2Btn").onclick = () => setSpeed(2);
document.getElementById("ff4Btn").onclick = () => setSpeed(4);
updateClock();

loadWorlds().then(restoreFromHash);
</script>
