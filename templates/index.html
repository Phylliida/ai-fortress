<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ai-fortress · world builder</title>
<style>
  :root {
    --bg:#1b1714; --panel:#262019; --ink:#ece3d4; --muted:#a99c86;
    --accent:#d8a657; --line:#3a3128; --ok:#8ab368; --err:#d77a61;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif; }
  h1 { font-family:Georgia,serif; font-weight:600; margin:0; font-size:21px; color:var(--accent); }
  h1 small { color:var(--muted); font-size:12px; font-weight:400; font-family:ui-monospace,monospace; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); }
  .wrap { display:grid; grid-template-columns:260px minmax(0,1fr) 360px; min-height:calc(100vh - 52px); }
  .sidebar { border-right:1px solid var(--line); background:var(--panel); padding:16px; }
  .main { padding:22px 26px; }
  .gridpanel { border-left:1px solid var(--line); padding:18px; background:var(--panel); }
  .gridpanel .gs { position:sticky; top:18px; }
  .gridpanel .gridhead { color:var(--accent); font:600 14px Georgia,serif; margin-bottom:10px; }
  .locgrid { display:grid; grid-template-columns:repeat(10,1fr); gap:2px; }
  .locgrid .cell { background:#15110d; border:1px solid var(--line); aspect-ratio:1; }
  .locgrid .cell:hover { border-color:var(--accent); }
  label { display:block; font-size:11px; color:var(--muted); margin:10px 0 4px; text-transform:uppercase; letter-spacing:.04em; }
  input, select, textarea { width:100%; background:#15110d; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:inherit; }
  textarea { resize:vertical; min-height:46px; }
  .row { display:flex; gap:8px; } .row > * { flex:1; }
  button { background:var(--accent); color:#1b1410; border:0; border-radius:7px; padding:8px 10px; font:600 13px/1 inherit; cursor:pointer; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button.sm { padding:5px 9px; font-size:12px; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .worldItem { padding:9px 11px; border:1px solid var(--line); border-radius:8px; margin-top:8px; cursor:pointer; background:#15110d; }
  .worldItem:hover { border-color:var(--accent); }
  .worldItem.active { border-color:var(--accent); }
  .worldItem .wp { font-size:13px; }
  .worldItem .wm { font-size:11px; color:var(--muted); margin-top:2px; }
  .sec { margin:22px 0; }
  .sec > h2 { font:600 13px/1 ui-monospace,monospace; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:15px 17px; margin-bottom:14px; }
  .card .nm { font-family:Georgia,serif; font-size:19px; color:var(--accent); }
  .card .meta { font-size:11px; color:var(--muted); font-family:ui-monospace,monospace; margin-bottom:6px; }
  .field { margin-top:8px; } .field .k { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .field .v { margin-top:1px; font-size:14px; }
  .pending { color:var(--muted); font-style:italic; }
  .locblock { border:1px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:12px; }
  .locblock > .lh { color:var(--accent); font:600 14px Georgia,serif; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { background:#15110d; border:1px solid var(--line); color:var(--accent); border-radius:13px; padding:3px 10px; font-size:12px; }
  .status { font:12px ui-monospace,monospace; color:var(--muted); margin:8px 0; min-height:16px; }
  .status.err { color:var(--err); } .status.ok { color:var(--ok); }
  .empty { color:var(--muted); font-style:italic; }
  /* prob bars (analysis) */
  .homeEntry { margin-bottom:2px; }
  .homeRow { display:flex; align-items:center; gap:9px; padding:2px 0; }
  .homeRow .hl { flex:0 0 165px; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .homeRow .bar { flex:1; height:12px; background:#15110d; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .homeRow .bar > i { display:block; height:100%; background:var(--accent); }
  .homeRow .hp { flex:0 0 44px; text-align:right; font:11px ui-monospace,monospace; color:var(--muted); }
  .homeRow.top .hl { color:var(--accent); font-weight:600; }
  table { width:100%; border-collapse:collapse; font:12px/1.4 ui-monospace,monospace; }
  td { padding:6px 9px; border-bottom:1px solid var(--line); vertical-align:top; }
  td.t { color:var(--muted); white-space:nowrap; width:1%; } td.l { color:var(--accent); white-space:nowrap; width:1%; text-align:right; }
  .gridHour { margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--line); }
  .gridHour .ghr { color:var(--accent); font:600 12px ui-monospace,monospace; margin-bottom:3px; }
  details.dbg { margin-top:4px; } details.dbg > summary { color:var(--muted); font-size:11px; cursor:pointer; list-style:none; }
  details.dbg > summary::-webkit-details-marker { display:none; }
  details.dbg > summary::before { content:"\25B8 prompt"; } details.dbg[open] > summary::before { content:"\25BE prompt"; }
  details.dbg pre { background:#15110d; border:1px solid var(--line); border-radius:6px; padding:7px 9px; margin:5px 0 0; font:11px/1.4 ui-monospace,monospace; color:var(--muted); white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto; }
  .analyzeBox { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  .analyzeBtns { display:flex; gap:8px; margin-bottom:8px; }
</style>
</head>
<body>
<header><h1>ai-fortress <small>· world builder · {{ server_url }}</small></h1></header>
<div class="wrap">
  <div class="sidebar">
    <label>New world</label>
    <textarea id="newPrompt" placeholder="A neon cyberpunk megacity…"></textarea>
    <button id="newWorldBtn" style="width:100%; margin-top:8px;">+ Create world</button>
    <label style="margin-top:18px">Worlds</label>
    <div id="worldList"></div>
  </div>
  <div class="main" id="main"><div class="empty">Create or pick a world.</div></div>
  <div class="gridpanel" id="gridPanel"><div class="empty">Click a location's ▦ grid.</div></div>
</div>

<script>
const SPECIES_DEFAULT = "human";
function el(tag, props={}, ...kids) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === "class") e.className = props[k];
    else if (k === "text") e.textContent = props[k];
    else if (k.startsWith("on") && typeof props[k] === "function") e.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) e.setAttribute(k, props[k]);
  }
  for (let kid of kids.flat()) if (kid != null) e.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  return e;
}
function stream(url, onmsg, onend) {
  const es = new EventSource(url);
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === "error") { es.close(); onend(false, d.message); return; }
    if (d.type === "done")  { es.close(); onend(true); return; }
    onmsg(d);
  };
  es.onerror = () => { es.close(); onend(false, "lost connection"); };
}

let state = { wid: null, world: null };

async function loadWorlds() {
  const { worlds } = await (await fetch("/api/worlds")).json();
  const list = document.getElementById("worldList"); list.innerHTML = "";
  for (const w of worlds) {
    list.appendChild(el("div", { class: "worldItem" + (w.id === state.wid ? " active" : ""), onclick: () => openWorld(w.id) },
      el("div", { class: "wp", text: w.prompt }),
      el("div", { class: "wm", text: `${w.n_characters} character${w.n_characters===1?"":"s"}${w.has_locations ? " · locations" : ""}` })));
  }
}
document.getElementById("newWorldBtn").onclick = async () => {
  const prompt = document.getElementById("newPrompt").value.trim();
  if (!prompt) return;
  const { id } = await (await fetch("/api/world", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prompt }) })).json();
  document.getElementById("newPrompt").value = "";
  await loadWorlds(); openWorld(id);
};
async function openWorld(wid) {
  state.wid = wid;
  state.world = await (await fetch("/api/world/" + wid)).json();
  loadWorlds(); renderWorld();
}

function charForm(at) {
  const gender = el("select", {}, ...["female", "male", "nonbinary"].map(g => el("option", { text: g })));
  const species = el("input", { value: SPECIES_DEFAULT });
  const btn = el("button", { class: "ghost sm", text: at ? "+ add character here" : "+ generate character" });
  const status = el("div", { class: "status" });
  const out = el("div");
  btn.onclick = () => {
    btn.disabled = true; status.textContent = "generating…"; status.className = "status";
    const q = new URLSearchParams({ gender: gender.value, species: species.value || SPECIES_DEFAULT });
    if (at) q.set("at", at);
    const card = el("div", { class: "card" }); out.appendChild(card);
    const nm = el("div", { class: "nm" }, el("span", { class: "pending", text: "summoning…" })); card.appendChild(nm);
    const fields = {};
    stream(`/api/world/${state.wid}/character?` + q, d => {
      if (d.type === "field" && d.field === "name") nm.textContent = d.value;
      else if (d.type === "field") {
        const f = el("div", { class: "field" }, el("div", { class: "k", text: d.field }), el("div", { class: "v", text: d.value }), promptDet(d.prompt, d.value));
        card.appendChild(f);
      } else if (d.type === "nocturnal") {
        card.appendChild(el("div", { class: "field" }, el("div", { class: "k", text: "nocturnal" }), el("div", { class: "v", text: Math.round(d.value*100) + "% likely" }), promptDet(d.prompt, Math.round(d.value*100) + "% P(yes)")));
      }
    }, (ok, msg) => {
      btn.disabled = false;
      status.textContent = ok ? "" : "⚠ " + msg; status.className = "status" + (ok ? "" : " err");
      if (ok) openWorld(state.wid);   // reload to show the persisted character
    });
  };
  const formRow = el("div", { class: "row", style: "align-items:flex-end; gap:8px; flex-wrap:wrap" },
    el("div", { style: "flex:0 0 110px" }, el("label", { text: "gender" }), gender),
    el("div", { style: "flex:1" }, el("label", { text: "species" }), species),
    el("div", { style: "flex:0 0 auto" }, btn));
  return el("div", {}, formRow, status, out);
}

function promptDet(p, output) {
  if (!p) return null;
  let text = p;
  if (output != null && output !== "") text += "\n\n─── model output ───\n" + output;
  return el("details", { class: "dbg" }, el("summary"), el("pre", { text }));
}

function charCard(ch) {
  const p = ch.prompts || {};
  const card = el("div", { class: "card" });
  card.appendChild(el("div", { class: "nm", text: ch.name }));
  if (p.name) card.appendChild(promptDet(p.name, ch.name));
  card.appendChild(el("div", { class: "meta", text: `${ch.gender} ${ch.species}` }));
  for (const f of ["appearance", "personality", "backstory"])
    if (ch[f]) card.appendChild(el("div", { class: "field" }, el("div", { class: "k", text: f }), el("div", { class: "v", text: ch[f] }), promptDet(p[f], ch[f])));
  if (ch.nocturnal != null)
    card.appendChild(el("div", { class: "field" }, el("div", { class: "k", text: "nocturnal" }), el("div", { class: "v", text: Math.round(ch.nocturnal*100) + "% likely" }), promptDet(p.nocturnal, Math.round(ch.nocturnal*100) + "% P(yes)")));
  // analysis
  const box = el("div", { class: "analyzeBox", hidden: "" });
  const out = el("div");
  const mkBtn = (label, fn) => el("button", { class: "ghost sm", text: label, onclick: () => fn(ch, out) });
  box.appendChild(el("div", { class: "analyzeBtns" },
    mkBtn("sleep spot", runSleep), mkBtn("24h presence", runPresence), mkBtn("schedule", runSchedule)));
  box.appendChild(out);
  const toggle = el("button", { class: "ghost sm", style: "margin-top:8px", text: "▸ analyze", onclick: () => {
    box.hidden = !box.hidden; toggle.textContent = (box.hidden ? "▸" : "▾") + " analyze";
  }});
  card.appendChild(toggle); card.appendChild(box);
  return card;
}

function renderWorld() {
  const w = state.world, main = document.getElementById("main"); main.innerHTML = "";
  main.appendChild(el("h1", { style: "font-size:24px; margin-bottom:4px" , text: w.prompt }));
  main.appendChild(el("div", { class: "meta", style: "color:var(--muted); font:11px ui-monospace,monospace; margin-bottom:14px", text: w.id }));

  // characters (seed)
  const seeds = w.characters.filter(c => c.role === "seed");
  const csec = el("div", { class: "sec" }, el("h2", { text: "Characters" }));
  seeds.forEach(c => csec.appendChild(charCard(c)));
  csec.appendChild(charForm(null));
  main.appendChild(csec);

  // locations
  const lsec = el("div", { class: "sec" }, el("h2", { text: "Locations (top 5)" }));
  if (w.locations.length) {
    for (const loc of w.locations) {
      const here = w.characters.filter(c => c.at === loc);
      const lh = el("div", { class: "lh" },
        el("span", { text: loc }),
        el("button", { class: "ghost sm", text: "▦ grid", onclick: () => viewGrid(loc) }),
        el("button", { class: "ghost sm", text: "👥 NPCs", onclick: () => viewNpcCounts(loc) }),
        el("button", { class: "ghost sm", text: "📦 objects", onclick: () => viewObjects(loc) }));
      const block = el("div", { class: "locblock" }, lh);
      here.forEach(c => block.appendChild(charCard(c)));
      block.appendChild(charForm(loc));
      lsec.appendChild(block);
    }
  } else {
    const status = el("div", { class: "status" });
    const btn = el("button", { class: "ghost", text: "Generate locations (ever-filter → top 5)", disabled: seeds.length ? null : "" });
    const ever = el("div");
    btn.onclick = () => {
      btn.disabled = true; ever.innerHTML = ""; status.textContent = "scoring locations…";
      const rows = []; let kept = null;
      stream(`/api/world/${state.wid}/locations`, d => {
        if (d.type === "ever") { rows.push(d); renderProbList(ever, rows, kept); }
        else if (d.type === "kept") { kept = new Set(d.locations); renderProbList(ever, rows, kept); }
      }, (ok, msg) => { status.textContent = ok ? "" : "⚠ " + msg; if (ok) openWorld(state.wid); });
    };
    lsec.appendChild(btn); lsec.appendChild(status); lsec.appendChild(ever);
    if (!seeds.length) lsec.appendChild(el("div", { class: "empty", text: "Generate a seed character first." }));
  }
  main.appendChild(lsec);
}

function viewGrid(loc) {
  const panel = document.getElementById("gridPanel");
  panel.innerHTML = "";
  const gs = el("div", { class: "gs" }, el("div", { class: "gridhead", text: loc }));
  const grid = el("div", { class: "locgrid" });
  for (let i = 0; i < 100; i++) grid.appendChild(el("div", { class: "cell", "data-i": String(i) }));
  gs.appendChild(grid);
  panel.appendChild(gs);
}

function viewNpcCounts(loc) {
  const panel = document.getElementById("gridPanel"); panel.innerHTML = "";
  const status = el("div", { class: "status", text: "sampling 10×…" });
  const result = el("div");
  const gs = el("div", { class: "gs" }, el("div", { class: "gridhead", text: loc + " — distinct NPCs / day" }), status, result);
  panel.appendChild(gs);
  stream(`/api/world/${state.wid}/npccounts?loc=${encodeURIComponent(loc)}`, d => {
    if (d.type !== "npc") return;
    result.innerHTML = "";
    result.appendChild(el("div", { style: "font:600 30px Georgia,serif; color:var(--accent); margin:4px 0", text: d.count == null ? "?" : "~" + d.count }));
    if (d.lo != null) result.appendChild(el("div", { class: "meta", style: "color:var(--muted)", text: `${d.n} samples ranged ${d.lo}–${d.hi}` }));
    const out = d.samples ? `samples: ${d.samples.join(", ")}\n→ median ${d.count}` : String(d.count);
    if (d.prompt) result.appendChild(promptDet(d.prompt, out));
  }, (ok, msg) => { status.textContent = ok ? "" : "⚠ " + msg; });
}

function viewObjects(loc) {
  const panel = document.getElementById("gridPanel"); panel.innerHTML = "";
  const existing = (state.world.objects || {})[loc];
  const status = el("div", { class: "status" });
  const chips = el("div", { class: "chips" });
  const detWrap = el("div");
  const btn = el("button", { class: "ghost sm", style: "margin-top:10px", text: existing ? "↻ regenerate" : "generate object types" });
  panel.appendChild(el("div", { class: "gs" }, el("div", { class: "gridhead", text: loc + " — object types" }), chips, detWrap, btn, status));
  function show(items, prompt) {
    chips.innerHTML = ""; detWrap.innerHTML = "";
    items.forEach(o => chips.appendChild(el("span", { class: "chip", text: o })));
    if (prompt) { const det = promptDet(prompt, items.join(", ")); if (det) detWrap.appendChild(det); }
  }
  if (existing) show(existing.items || [], existing.prompt);
  function run() {
    btn.disabled = true; status.textContent = "generating (re-sample + dedup)…";
    const items = []; let prompt = null; show(items, null);
    stream(`/api/world/${state.wid}/objects?loc=${encodeURIComponent(loc)}`, d => {
      if (d.type === "object") { items.push(d.value); prompt = d.prompt; show(items, prompt); }
    }, (ok, msg) => {
      btn.disabled = false; status.textContent = ok ? "" : "⚠ " + msg;
      if (ok) (state.world.objects = state.world.objects || {})[loc] = { items, prompt };
    });
  }
  btn.onclick = run;
  if (!existing) run();
}

// ---- analysis renderers (reused prob bars / grid / schedule) ----
function probRow(r, top, marker, dim) {
  const entry = el("div", { class: "homeEntry" });
  if (dim) entry.style.opacity = "0.4";
  const fill = el("i"); fill.style.width = Math.round(r.prob*100) + "%";
  entry.appendChild(el("div", { class: "homeRow" + (top ? " top" : "") },
    el("div", { class: "hl", text: (top ? marker : "") + r.location }),
    el("div", { class: "bar" }, fill),
    el("div", { class: "hp", text: (r.prob*100).toFixed(0) + "%" })));
  if (r.prompt) entry.appendChild(promptDet(r.prompt, "P(yes) = " + (r.prob != null ? r.prob.toFixed(3) : "?")));
  return entry;
}
function renderProbList(container, rows, keptSet) {
  const sorted = rows.slice().sort((a, b) => b.prob - a.prob);
  container.innerHTML = "";
  sorted.forEach((r, i) => {
    const kept = keptSet ? keptSet.has(r.location) : null;
    container.appendChild(probRow(r, keptSet ? kept : i === 0, keptSet ? "✓ " : "★ ", keptSet ? !kept : false));
  });
}
function runSleep(ch, out) {
  out.innerHTML = ""; const box = el("div"); out.appendChild(box); const rows = [];
  stream(`/api/world/${state.wid}/char/${ch.cid}/sleep`, d => { if (d.type === "sleep") { rows.push(d); renderProbList(box, rows, null); } }, () => {});
}
function runPresence(ch, out) {
  out.innerHTML = ""; const secs = {};
  stream(`/api/world/${state.wid}/char/${ch.cid}/presence`, d => {
    if (d.type !== "presence") return;
    if (!secs[d.time]) {
      const rowsEl = el("div");
      out.appendChild(el("div", { class: "gridHour" }, el("div", { class: "ghr", text: d.time }), rowsEl));
      secs[d.time] = { rowsEl, items: [] };
    }
    const s = secs[d.time]; s.items.push(d);
    const sorted = s.items.slice().sort((a, b) => b.prob - a.prob);
    s.rowsEl.innerHTML = ""; sorted.forEach((r, i) => s.rowsEl.appendChild(probRow(r, i === 0, "📍 ", false)));
  }, () => {});
}
function runSchedule(ch, out) {
  out.innerHTML = ""; const tb = el("tbody"); out.appendChild(el("table", {}, tb));
  stream(`/api/world/${state.wid}/char/${ch.cid}/schedule?steps=12`, d => {
    if (d.type !== "slot") return;
    const det = promptDet(`── action prompt ──\n${d.action_prompt}\n→ ${d.action || ""}\n\n── location prompt ──\n${d.loc_prompt}\n→ ${d.location || ""}`);
    tb.appendChild(el("tr", {},
      el("td", { class: "t", text: d.time }),
      el("td", {}, el("div", { text: d.action || "" }), det),
      el("td", { class: "l", text: d.location || "" })));
  }, () => {});
}

loadWorlds();
</script>
</body>
</html>
