<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loot · ai-fortress</title>
<style>
  :root {
    --bg:#1b1714; --panel:#262019; --ink:#ece3d4; --muted:#a99c86; --accent:#d8a657; --line:#3a3128;
    --worn:#d8a657; --held:#d77a61; --container:#b08a5a; --piercing:#c08fd0; --jewelry:#e8c84a; --extra:#8ab368;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif; }
  header { display:flex; align-items:baseline; gap:12px; padding:16px 22px; border-bottom:1px solid var(--line); background:var(--panel); }
  h1 { font-family:Georgia,serif; font-weight:600; margin:0; font-size:21px; color:var(--accent); }
  header small { color:var(--muted); font-size:12px; font-family:ui-monospace,monospace; }
  header .links { margin-left:auto; display:flex; gap:14px; }
  header a { color:var(--muted); font-size:12px; text-decoration:none; } header a:hover { color:var(--accent); }
  .wrap { max-width:880px; margin:0 auto; padding:22px; }
  .controls { display:flex; gap:9px; flex-wrap:wrap; align-items:center; }
  input { background:#15110d; color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:8px 11px; font:inherit; }
  input::placeholder { color:var(--muted); }
  #wealth { width:130px; } #species { width:150px; } #occupation { width:160px; } #gender { width:100px; }
  button { background:var(--accent); color:#1b1410; border:0; border-radius:7px; padding:8px 16px; font-weight:600; cursor:pointer; }
  .who { font-family:Georgia,serif; font-size:20px; color:var(--accent); margin:18px 2px 4px; min-height:24px; }
  #status { color:var(--muted); font-size:12px; font-style:italic; min-height:18px; margin:2px 2px 14px; }
  .groups { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; }
  .group { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px 14px; }
  .group.extra { border-color:var(--extra); }
  .group h2 { margin:0 0 8px; font-size:11px; font-family:ui-monospace,monospace; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .item { display:flex; align-items:baseline; gap:8px; padding:3px 0; }
  .item .dot { width:8px; height:8px; border-radius:50%; flex:0 0 8px; position:relative; top:1px; }
  .item .slot { color:var(--muted); font-size:11px; font-family:ui-monospace,monospace; flex:0 0 84px; }
  .item .what { color:var(--ink); }
  .item .n { color:var(--muted); font-size:10px; }
  .legend { display:flex; flex-wrap:wrap; gap:12px; margin:14px 2px 2px; font-size:11px; color:var(--muted); }
  .legend span { display:inline-flex; align-items:center; gap:5px; } .legend .dot { width:8px; height:8px; border-radius:50%; }
</style>
</head>
<body>
<header>
  <h1>Loot</h1>
  <small>species + wealth + profession → a dressed paper-doll</small>
  <div class="links"><a href="/slots">paper doll →</a><a href="/parts">innards →</a><a href="/decompose">take apart →</a></div>
</header>

<div class="wrap">
  <div class="controls">
    <input id="wealth" placeholder="wealth" list="wealths">
    <datalist id="wealths"><option>destitute</option><option>poor</option><option>modest</option><option>comfortable</option><option>wealthy</option><option>noble</option></datalist>
    <input id="gender" placeholder="gender">
    <input id="species" placeholder="species" autofocus>
    <input id="occupation" placeholder="profession">
    <button id="go">Dress</button>
  </div>
  <div class="legend">
    <span><i class="dot" style="background:var(--worn)"></i>worn</span>
    <span><i class="dot" style="background:var(--held)"></i>held</span>
    <span><i class="dot" style="background:var(--container)"></i>carried</span>
    <span><i class="dot" style="background:var(--piercing)"></i>piercing</span>
    <span><i class="dot" style="background:var(--jewelry)"></i>jewelry</span>
    <span><i class="dot" style="background:var(--extra)"></i>extra</span>
  </div>
  <div class="who" id="who"></div>
  <div id="status"></div>
  <div class="groups" id="groups"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const REGION = {
  head:'Head & Face', eyes:'Head & Face', face:'Head & Face', ears:'Head & Face', nose:'Head & Face',
  lips:'Head & Face', eyebrows:'Head & Face', tongue:'Head & Face',
  neck:'Neck & Torso', back:'Neck & Torso', chest:'Neck & Torso', torso:'Neck & Torso', navel:'Neck & Torso', waist:'Neck & Torso',
  wrists:'Arms & Hands', hands:'Arms & Hands', fingers:'Arms & Hands',
  hips:'Lower Body', legs:'Lower Body', ankles:'Lower Body', feet:'Lower Body',
};
const ORDER = ['Head & Face','Neck & Torso','Arms & Hands','Lower Body','Carried','Held','Extra'];
let es = null;
// slot -> body site (mirrors slots.HUMAN_SLOTS) so worn/jewelry/piercing items land in the right region
const SLOT_SITE = {
  hat:'head', glasses:'eyes', mask:'face', earring:'ears', 'nose ring':'nose', 'lip ring':'lips',
  'eyebrow ring':'eyebrows', 'tongue ring':'tongue', 'navel ring':'navel', necklace:'neck', cloak:'back',
  bra:'chest', shirt:'torso', coat:'torso', belt:'waist', bracelet:'wrists', gloves:'hands', ring:'fingers',
  underwear:'hips', pants:'legs', anklet:'ankles', socks:'feet', shoes:'feet',
};

function groupChips(name) {
  let g = document.getElementById('grp-' + name);
  if (!g) {
    g = document.createElement('div');
    g.className = 'group' + (name === 'Extra' ? ' extra' : '');
    g.id = 'grp-' + name;
    g.innerHTML = `<h2>${name}</h2>`;
    const groups = $('groups'); const idx = ORDER.indexOf(name); let before = null;
    for (const child of groups.children) {
      if (ORDER.indexOf(child.id.replace('grp-','')) > idx) { before = child; break; }
    }
    groups.insertBefore(g, before);
  }
  return g;
}

function addItem(m) {
  const region = (m.kind === 'extra') ? 'Extra' : (m.kind === 'container') ? 'Carried'
               : (m.kind === 'held') ? 'Held' : (REGION[SLOT_SITE[m.slot]] || 'Other');
  const g = groupChips(region);
  const row = document.createElement('div'); row.className = 'item';
  const dot = document.createElement('i'); dot.className = 'dot'; dot.style.background = `var(--${m.kind})`;
  const slot = document.createElement('span'); slot.className = 'slot'; slot.textContent = m.slot;
  const what = document.createElement('span'); what.className = 'what'; what.textContent = m.item;
  row.append(dot, slot, what);
  if (m.count > 1) { const n = document.createElement('span'); n.className = 'n'; n.textContent = '×' + m.count; row.appendChild(n); }
  g.appendChild(row);
}

function currentQuery() {
  return ['species','wealth','occupation','gender']
    .map(k => $(k).value.trim() ? k + '=' + encodeURIComponent($(k).value.trim()) : '')
    .filter(Boolean).join('&');
}
function hashToState() {           // populate inputs from the URL hash; true if it carries a species
  const p = new URLSearchParams(location.hash.replace(/^#/, ''));
  for (const k of ['species','wealth','occupation','gender'])
    if (p.get(k) != null) $(k).value = p.get(k);
  return !!(p.get('species') || '').trim();
}
function dress() {
  const species = $('species').value.trim();
  if (!species) { $('species').focus(); return; }
  const q = currentQuery();
  location.hash = q;               // store state in the hash so the URL is copy-paste shareable
  if (es) es.close();
  $('groups').innerHTML = ''; $('who').textContent = ''; $('status').textContent = 'starting…';
  es = new EventSource('/api/dress?' + q);
  es.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'item') addItem(m);
    else if (m.type === 'prefix') $('who').textContent = m.text;
    else if (m.type === 'status') $('status').textContent = m.message;
    else if (m.type === 'done') { es.close(); $('status').textContent = `dressed — ${m.n} items.`; }
    else if (m.type === 'error') { es.close(); $('status').textContent = m.message; }
  };
  es.onerror = () => { es.close(); $('status').textContent = 'connection lost'; };
}

$('go').onclick = dress;
for (const id of ['species','occupation','wealth','gender'])
  $(id).addEventListener('keydown', e => { if (e.key === 'Enter') dress(); });
window.addEventListener('hashchange', () => {        // paste a shared URL into an open tab
  if (location.hash.replace(/^#/, '') === currentQuery()) return;   // hash already matches inputs (we set it)
  if (hashToState()) dress();
});
if (hashToState()) dress();                          // shared link: restore inputs + auto-dress on load
</script>
</body>
</html>
